spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_english?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  oauth2:
    redirect-uri: http://localhost:8080/oauth2/callback