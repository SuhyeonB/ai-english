spring:
  application:
    name: ai-english
  profiles:
    active: dev

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000  # 30min (ms)
  refresh-token-expiration: 604800000 # 7days

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o
  max-tokens: 1000